services:
  - type: web
    name: meetingmind
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    disk:
      name: temp-storage
      sizeGb: 1
    envVars:
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: DASHSCOPE_REGION
        value: singapore
      - key: OSS_ACCESS_KEY_ID
        sync: false
      - key: OSS_ACCESS_KEY_SECRET
        sync: false
      - key: OSS_BUCKET_NAME
        sync: false
      - key: OSS_ENDPOINT
        sync: false
